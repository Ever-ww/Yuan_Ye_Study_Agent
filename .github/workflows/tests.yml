name: tests

# push 与 pull_request 使用同一组无密钥测试，避免两个工作流配置逐渐漂移。
on:
  push:
  pull_request:

# 测试只需读取仓库内容，显式收紧自动签发的 GITHUB_TOKEN 权限。
permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 20
    strategy:
      # 一个环境失败时仍运行完整矩阵，便于一次看清所有平台的结果。
      fail-fast: false
      # Windows 是首要平台，同时用 Ubuntu 防止大小写路径和平台 API 造成不可移植问题。
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      # 与本地开发说明保持一致：由 uv 选择 Python、安装锁定依赖并运行检查。
      - name: 安装 uv 并选择 Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: 按锁文件安装开发依赖
        run: uv sync --frozen --extra dev
      - name: 运行 pytest
        run: uv run --frozen --extra dev python -m pytest -q
      - name: 运行 unittest
        run: uv run --frozen --extra dev python -m unittest discover -s tests -v
      - name: 编译检查
        run: uv run --frozen --extra dev python -m compileall -q Agent bootstrap memory prompt tools run_ui tests run.py
